name: Build Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Prepare Web Assets
        shell: bash
        run: |
          mkdir -p www
          cp -r index.html style.css script.js manifest.json api www/ 2>/dev/null || true
      - name: Build Tauri App
        run: npm run tauri build
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Vert-Windows-App
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install dependencies
        run: npm install
      - name: Prepare Web Assets
        run: |
          mkdir www
          cp -r index.html style.css script.js manifest.json api www/ 2>/dev/null || true
      - name: Add Android Platform
        run: npx cap add android
      - name: Generate Android Icons
        run: |
          npm install -g @capacitor/assets
          mkdir -p assets
          cp src-tauri/icons/icon.png assets/icon.png
          cp src-tauri/icons/icon.png assets/splash.png
          npx capacitor-assets generate --android
      - name: Native Android Popup Blocker
        run: |
          cat << 'EOF' > android/app/src/main/java/com/vert/app/MainActivity.java
          package com.vert.app;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
              @Override
              public void onStart() {
                  super.onStart();
                  WebView webView = this.bridge.getWebView();
                  webView.getSettings().setSupportMultipleWindows(false);
                  webView.getSettings().setJavaScriptCanOpenWindowsAutomatically(false);
              }
              @Override
              public void startActivity(Intent intent) {
                  if (Intent.ACTION_VIEW.equals(intent.getAction())) {
                      Uri uri = intent.getData();
                      if (uri != null && ("http".equals(uri.getScheme()) || "https".equals(uri.getScheme()))) {
                          return;
                      }
                  }
                  super.startActivity(intent);
              }
          }
          EOF
      - name: Build Android APK
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug
      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/vert-v$VERSION.apk
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Vert-Android-App
          path: android/app/build/outputs/apk/debug/vert-*.apk
